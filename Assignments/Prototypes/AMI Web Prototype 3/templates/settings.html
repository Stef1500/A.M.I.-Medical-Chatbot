<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>A.M.I.</title>
    <link rel = "stylesheet" href = "../static/styles.css">
    <link rel = "stylesheet" href = "../static/settings.css">
    <script type = "text/javascript" src = "../static/darkmode.js" defer></script>
</head>
<body>
    <div class = "settings-area">
        <div class = "back-to-chat">
                <a href = "/chat" style = "color: inherit; text-decoration: none;">
                    <h4>← back</h4>
                </a>
        </div>

        <h2>SETTINGS</h2>
        <br>
        <div class = "mode">
            <!--NF: Extra spaces used for the CSS text ("light mode" and "dark mode").-->
            <B>Appearance   </B>
            <label class="switch">
                <input type="checkbox" id="change-mode">
                <span class="slider"></span>
            </label>
        </div>
        <!--NF: AMI's "Perferences" section still needs to be implemented.-->
        {% if session['logged_in'] %}
            <B> Preferences </B>
            <form method="POST" action = "/preferences">
                <textarea name="preferences" rows = 10 cols = 42 wrap = "hard" >Place your preferred behavior of AMI here. It will be evaluated and you will be informed if it is valid.
                </textarea>
                <button type="submit">Submit</button>
            </form>
        {% endif %}

        <div class = "about-us">
            <a href = "/aboutus" style = "color: inherit; text-decoration: none;">
                <h4>About Us <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#1f1f1f"><path d="M513.5-254.5Q528-269 528-290t-14.5-35.5Q499-340 478-340t-35.5 14.5Q428-311 428-290t14.5 35.5Q457-240 478-240t35.5-14.5ZM442-394h74q0-33 7.5-52t42.5-52q26-26 41-49.5t15-56.5q0-56-41-86t-97-30q-57 0-92.5 30T342-618l66 26q5-18 22.5-39t53.5-21q32 0 48 17.5t16 38.5q0 20-12 37.5T506-526q-44 39-54 59t-10 73Zm38 314q-83 0-156-31.5T197-197q-54-54-85.5-127T80-480q0-83 31.5-156T197-763q54-54 127-85.5T480-880q83 0 156 31.5T763-763q54 54 85.5 127T880-480q0 83-31.5 156T763-197q-54 54-127 85.5T480-80Zm0-80q134 0 227-93t93-227q0-134-93-227t-227-93q-134 0-227 93t-93 227q0 134 93 227t227 93Zm0-320Z"/></svg></h4>
            </a>
        </div>
    </div>
</body>
</html>

<script>
    const toggle = document.getElementById("change-mode");


    const savedMode = localStorage.getItem("darkmode");

    if (savedMode === "enabled") {
        document.body.classList.add("darkmode");
        toggle.checked = true;
    }

    toggle.addEventListener("change", () => {
        if (toggle.checked) {
            document.body.classList.add("darkmode");
            localStorage.setItem("darkmode", "enabled");
        } else {
            document.body.classList.remove("darkmode");
            localStorage.setItem("darkmode", "disabled");
        }
    });
</script>
